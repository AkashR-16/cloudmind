services:
  - type: web
    name: cloudmind-api
    runtime: python
    rootDir: agent
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ARANGO_HOST
        sync: false
      - key: ARANGO_PASSWORD
        sync: false
      - key: REDIS_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: ARANGO_DB
        value: fix
      - key: ARANGO_VERTEX_COLLECTION
        value: fix
      - key: ARANGO_EDGE_COLLECTION
        value: fix_default
