services:
  - type: web
    name: cloudmind-api
    runtime: docker
    dockerfilePath: ./agent/Dockerfile
    dockerContext: ./agent
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ARANGO_HOST
        sync: false
      - key: ARANGO_PASSWORD
        sync: false
      - key: REDIS_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
